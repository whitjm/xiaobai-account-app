<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 内容安全策略(CSP):把资源限制在本应用内,禁止加载外部网站的脚本/内容,给桌面软件加一道防护。
         说明:style 允许内联(图表库 recharts、日历控件会注入内联样式);
         script/connect 保留 eval 和 ws,是为了兼容开发模式下 Vite 的热更新,打包后同样安全。 -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: http://localhost:5173; font-src 'self' data:"
    />
    <title>小白记账</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
